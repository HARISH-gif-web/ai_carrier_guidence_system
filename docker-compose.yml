version: '3.8'

services:
  backend:
    build: .
    container_name: career-recommender-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data
      - ./backend:/app/backend
    restart: unless-stopped
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: nginx:latest
    container_name: career-recommender-frontend
    ports:
      - "80:80"
    volumes:
      - ./:/usr/share/nginx/html
    depends_on:
      - backend
    restart: unless-stopped
