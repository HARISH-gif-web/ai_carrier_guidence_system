<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Career Guidance System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 40px;
            max-width: 800px;
            margin: 0 auto;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .input-section {
            margin-bottom: 30px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .result {
            display: none;
            background: #f8f9ff;
            padding: 25px;
            border-radius: 10px;
            border-left: 5px solid #667eea;
            margin-bottom: 20px;
        }

        .result.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 20px;
        }

        .result-item {
            margin-bottom: 15px;
        }

        .result-item b {
            color: #333;
            display: block;
            margin-bottom: 5px;
        }

        .result-item span {
            color: #666;
            display: block;
        }

        .skill-badge {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            margin-right: 8px;
            margin-bottom: 8px;
            font-size: 12px;
        }

        .skill-missing {
            background: #ff6b6b;
        }

        .match-score {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }

        .tasks-list {
            list-style: none;
        }

        .tasks-list li {
            background: white;
            padding: 10px 15px;
            margin-bottom: 8px;
            border-radius: 6px;
            border-left: 3px solid #667eea;
            color: #666;
        }

        .error {
            background: #ffe0e0;
            color: #d32f2f;
            border-left-color: #d32f2f;
        }

        .loading {
            text-align: center;
            color: #667eea;
            font-weight: 500;
        }

        .roles-container {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px solid #e0e0e0;
        }

        .role-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .role-card {
            background: #f8f9ff;
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .role-card:hover {
            border-color: #667eea;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
        }

        .role-card h3 {
            color: #667eea;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .role-card p {
            color: #999;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 AI Career Guidance System</h1>
        <p class="subtitle">Discover your ideal career path based on your skills</p>

        <div class="input-section">
            <label for="skillsInput">Enter Your Skills (comma separated)</label>
            <input 
                type="text" 
                id="skillsInput" 
                placeholder="e.g., Python, Machine Learning, JavaScript, React"
                autocomplete="off"
            >
            <div class="button-group">
                <button class="btn-primary" onclick="getRecommendation()">Get Recommendation</button>
                <button class="btn-secondary" onclick="loadAllRoles()">View All Roles</button>
            </div>
        </div>

        <div id="result" class="result"></div>

        <div id="rolesContainer" class="roles-container" style="display: none;">
            <h2>Available Career Paths</h2>
            <div id="rolesGrid" class="role-grid"></div>
        </div>
    </div>

    <script>
        const API_BASE_URL = "http://127.0.0.1:8000";

        async function getRecommendation() {
            const skillsInput = document.getElementById("skillsInput").value.trim();
            const resultDiv = document.getElementById("result");

            if (!skillsInput) {
                showResult("Please enter at least one skill", true);
                return;
            }

            resultDiv.innerHTML = '<div class="loading">⏳ Analyzing your skills...</div>';
            resultDiv.classList.add("show");

            try {
                const response = await fetch(`${API_BASE_URL}/recommend`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        skills: skillsInput.split(",").map(s => s.trim())
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();

                if (data.error) {
                    showResult(data.error, true);
                    return;
                }

                let html = `
                    <h2>✨ Career Recommendation</h2>
                    <div class="result-item">
                        <b>Recommended Career:</b>
                        <span style="font-size: 18px; color: #667eea; font-weight: bold;">${data.recommended_career}</span>
                    </div>
                    <div class="result-item">
                        <b>Match Score:</b>
                        <span class="match-score">${data.match_percentage}%</span>
                    </div>
                `;

                if (data.salary_range) {
                    html += `
                        <div class="result-item">
                            <b>Salary Range:</b>
                            <span>${data.salary_range}</span>
                        </div>
                    `;
                }

                if (data.difficulty) {
                    html += `
                        <div class="result-item">
                            <b>Difficulty Level:</b>
                            <span>${data.difficulty}</span>
                        </div>
                    `;
                }

                if (data.matched_skills && data.matched_skills.length > 0) {
                    html += `
                        <div class="result-item">
                            <b>Your Skills:</b>
                            <div>
                                ${data.matched_skills.map(s => `<span class="skill-badge">${s}</span>`).join("")}
                            </div>
                        </div>
                    `;
                }

                if (data.missing_skills && data.missing_skills.length > 0) {
                    html += `
                        <div class="result-item">
                            <b>Skills to Learn:</b>
                            <div>
                                ${data.missing_skills.map(s => `<span class="skill-badge skill-missing">${s}</span>`).join("")}
                            </div>
                        </div>
                    `;
                }

                if (data.tasks && data.tasks.length > 0) {
                    html += `
                        <div class="result-item">
                            <b>Learning Tasks:</b>
                            <ul class="tasks-list">
                                ${data.tasks.map(task => `<li>📋 ${task}</li>`).join("")}
                            </ul>
                        </div>
                    `;
                }

                resultDiv.innerHTML = html;

            } catch (error) {
                console.error("Error:", error);
                showResult(`⚠️ Error connecting to backend. Make sure the server is running at ${API_BASE_URL}`, true);
            }
        }

        async function loadAllRoles() {
            const rolesContainer = document.getElementById("rolesContainer");
            const rolesGrid = document.getElementById("rolesGrid");

            rolesContainer.style.display = "block";
            rolesGrid.innerHTML = '<div class="loading">Loading roles...</div>';

            try {
                const response = await fetch(`${API_BASE_URL}/roles`);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                const roles = data.roles || [];

                let html = "";
                for (const role of roles) {
                    const roleDetails = await fetch(`${API_BASE_URL}/roles/${encodeURIComponent(role)}`);
                    const roleData = await roleDetails.json();

                    html += `
                        <div class="role-card" onclick="selectRole('${role}')">
                            <h3>${role}</h3>
                            <p>${roleData.difficulty || "N/A"} Level</p>
                            <p>${roleData.salary_range || "N/A"}</p>
                        </div>
                    `;
                }

                rolesGrid.innerHTML = html;

            } catch (error) {
                console.error("Error:", error);
                rolesGrid.innerHTML = `<div class="error">Failed to load roles. Make sure the backend is running.</div>`;
            }
        }

        function selectRole(role) {
            document.getElementById("skillsInput").value = role;
        }

        function showResult(message, isError = false) {
            const resultDiv = document.getElementById("result");
            resultDiv.innerHTML = `<div class="${isError ? "error" : ""}">${message}</div>`;
            resultDiv.classList.add("show");
        }

        // Load roles on page load
        window.addEventListener("load", () => {
            console.log("🚀 Career Guidance System loaded");
            console.log(`📡 API Base URL: ${API_BASE_URL}`);
        });
    </script>
</body>
</html>
